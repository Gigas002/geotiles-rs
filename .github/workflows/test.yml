name: Test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        features:
          - --all-features
          - --no-default-features

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.features }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgdal-dev
      - name: Test (${{ matrix.features }})
        run: RUSTFLAGS='-D warnings' cargo test -p libgeotiles ${{ matrix.features }}
