[files]
extend-exclude = [
    "target/",
    "target/geotiles-test-data/",
    "Cargo.lock",
    # C# reference codebase — not maintained by this project
    "GTiff2Tiles/",
]

[default]
extend-ignore-identifiers-re = ["[Pp]aeth"]

[default.extend-words]
# Paeth is a proper noun (PNG filter named after Alan W. Paeth).
paeth = "paeth"
